name: Main Extension Distribution Pipeline
on:
  push:
    tags:
      - "*"
  pull_request:
    paths:
      - "CMakeLists.txt"
      - "Makefile"
      - "extension_config.cmake"
      - "vcpkg.json"
      - ".github/workflows/Distribution.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5-variegata
    with:
      duckdb_version: v1.5-variegata
      ci_tools_version: v1.5-variegata
      extension_name: lance
      extra_toolchains: "rust"
      opt_in_archs: "windows_amd64"

  extract-lance-extension:
    name: Extract lance.duckdb_extension
    needs: duckdb-stable-build
    runs-on: ubuntu-latest
    steps:
      - name: Download build-release artifact
        uses: actions/download-artifact@v4
        with:
          # this matches the name you see in the logs: build-release-<hash>.zip
          # download-artifact ignores the .zip suffix; name is 'build-release-*'
          # so we just download ALL artifacts to a folder and then glob inside
          path: artifacts

      - name: Upload only lance.duckdb_extension
        uses: actions/upload-artifact@v4
        with:
          name: lance-windows_amd64-extension
          path: |
            artifacts/**/extension/lance/lance.duckdb_extension
